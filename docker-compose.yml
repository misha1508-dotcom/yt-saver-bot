version: '3.8'

services:
  yt-saver:
    build: .
    container_name: yt-saver
    environment:
      - COOKIES_FILE=/app/cookies.txt
    ports:
      - "8000:8000"
    volumes:
      - yt-downloads:/tmp/yt-saver-downloads
    restart: unless-stopped
    networks:
      - vibe-network

volumes:
  yt-downloads:

networks:
  vibe-network:
    external: true
